<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡牌转盘精算工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f8fa;--card:#fff;--border:#e5e7eb;--text:#1a1a2e;--text2:#6b7280;
  --blue:#2563eb;--blue-light:#eff6ff;--blue-dark:#1e40af;
  --red:#dc2626;--red-light:#fef2f2;
  --green:#16a34a;--green-light:#f0fdf4;
  --amber:#d97706;--amber-light:#fffbeb;
  --sr:#fce4ec;--sr-dark:#880e4f;
  --r:#fff3e0;--r-dark:#e65100;
  --n:#e8f5e9;--n-dark:#1b5e20;
  --font:'Noto Sans SC',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a87 100%);color:#fff;padding:24px 32px}
.header h1{font-size:22px;font-weight:700;letter-spacing:0.5px}
.header p{font-size:13px;opacity:0.8;margin-top:4px}
.container{max-width:1100px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0}
.tab{padding:10px 20px;font-size:14px;font-weight:500;background:none;border:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.2s}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.tab:hover:not(.active){color:var(--text);background:#f3f4f6;border-radius:6px 6px 0 0}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:24px}
.metric{background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border)}
.metric .label{font-size:12px;color:var(--text2);font-weight:500}
.metric .value{font-size:22px;font-weight:700;margin-top:2px;font-family:var(--mono)}
.metric.danger{border-color:#fca5a5;background:var(--red-light)}
.metric.danger .value{color:var(--red)}
.metric.ok .value{color:var(--green)}
.section{margin-bottom:24px}
.section-title{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title .badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.params-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;align-items:end}
.param-group{display:flex;flex-direction:column;gap:4px}
.param-group label{font-size:12px;color:var(--text2);font-weight:500}
.param-group input{width:100px;padding:6px 10px;border:1.5px solid var(--blue);border-radius:6px;font-size:14px;font-weight:600;color:var(--blue-dark);background:var(--blue-light);text-align:right;font-family:var(--mono);transition:border-color 0.2s}
.param-group input:focus{outline:none;border-color:var(--blue-dark);box-shadow:0 0 0 3px rgba(37,99,235,0.15)}
.param-group input.wide{width:130px}
.param-group .derived{width:100px;padding:6px 10px;font-size:14px;font-weight:600;color:var(--text);background:#f1f5f9;border-radius:6px;text-align:right;font-family:var(--mono);border:1.5px solid var(--border)}
table{width:100%;border-collapse:separate;border-spacing:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);font-size:13px}
thead{background:#334155;color:#fff}
th{padding:10px 8px;text-align:left;font-weight:500;font-size:12px;white-space:nowrap}
td{padding:8px;border-bottom:1px solid #f1f5f9}
tbody tr:last-child td{border-bottom:none}
tr.sr-row{background:var(--sr)}
tr.r-row{background:var(--r)}
tr.n-row{background:var(--n)}
tr.total-row{background:#e2e8f0;font-weight:600}
td input{width:80px;padding:4px 8px;border:1.5px solid var(--blue);border-radius:4px;font-size:13px;font-weight:600;color:var(--blue-dark);background:var(--blue-light);text-align:right;font-family:var(--mono)}
td input:focus{outline:none;border-color:var(--blue-dark);box-shadow:0 0 0 2px rgba(37,99,235,0.15)}
/* 移除所有 number input 的 spinner 箭頭 */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;appearance:none;margin:0;width:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}
.weight-cell{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--blue-dark);text-align:center}
.prob-cell{font-family:var(--mono);text-align:right}
.num-cell{font-family:var(--mono);text-align:right}
.center{text-align:center}
.err-ok{color:var(--green);font-weight:500}
.err-warn{color:var(--amber);font-weight:500}
.err-bad{color:var(--red);font-weight:600}
.n-info{padding:14px 18px;background:var(--n);border-radius:8px;border:1px solid #a5d6a7;font-size:13px;display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.n-info strong{color:var(--n-dark)}
.n-info .error{color:var(--red);font-weight:600}
.copy-btn{padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.copy-btn:hover{background:var(--blue-dark)}
.copy-btn:active{transform:scale(0.97)}
.copied{background:var(--green) !important}
.note{font-size:12px;color:var(--text2);margin-top:8px;padding:8px 12px;background:#f8fafc;border-radius:6px;border-left:3px solid var(--blue)}
@media(max-width:768px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .container{padding:12px}
  .params-row{gap:10px}
  table{font-size:12px}
  td input{width:65px;font-size:12px}
  .weight-cell{font-size:14px}
}
</style>
</head>
<body>

<div class="header">
  <h1>卡牌转盘精算工具</h1>
  <p>设定票数占比 → 产量 / 概率 / 权重即时分配，预算使用率同步验算</p>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('params',this)">参数设定</button>
    <button class="tab" onclick="switchTab('weights',this)">权重速查 (<span id="totalCardTypes">40</span>张)</button>
  </div>

  <div id="metrics" class="metrics"></div>

  <div id="tab-params">
    <div class="section">
      <div class="section-title">基本参数</div>
      <div class="params-row">
        <div class="param-group"><label>总投注额 (RMB)</label><input type="number" id="totalBet" value="100000000" class="wide" oninput="calc()"></div>
        <div class="param-group"><label>RTP %</label><input type="number" id="rtp" value="1" step="0.1" min="0" max="100" style="width:60px" oninput="calc()"></div>
        <div class="param-group"><label>总券数</label><input type="number" id="tickets" value="100000" oninput="calc()"></div>
      </div>
      <div class="params-row">
        <div class="param-group"><label>大奖池票数占比 %</label><input type="number" id="srPct" value="0.1" min="0" max="100" step="0.01" style="width:70px" oninput="calc()"></div>
        <div class="param-group"><label>中奖池票数占比 %</label><input type="number" id="rPct" value="2" min="0" max="100" step="0.1" style="width:70px" oninput="calc()"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">SR 卡 <span class="badge" style="background:var(--sr);color:var(--sr-dark)">大奖池 <span id="srCount">6</span>张</span></div>
      <table>
        <thead><tr><th>球员</th><th>奖金 (RMB)</th><th>产量</th><th>概率</th><th>支出</th><th>权重</th></tr></thead>
        <tbody id="sr-body"></tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">R 套组 <span class="badge" style="background:var(--r);color:var(--r-dark)">中奖池 <span id="rCount">28</span>张</span></div>
      <div class="params-row">
        <div class="param-group"><label>套组兑换率 %</label><input type="number" id="redeemRate" value="70" min="0" max="100" style="width:60px" oninput="calc()"></div>
        <div class="param-group"><label>球员卡倍数 (相对国家卡)</label><input type="number" id="playerMultiplier" value="3" min="1" max="20" step="0.5" style="width:60px" oninput="calc()"></div>
      </div>
      <table>
        <thead><tr><th>套组</th><th>国家</th><th>套组奖金</th><th>国家卡产量</th><th>球员卡产量</th><th>估计兑换</th><th>支出</th><th>国家卡权重</th></tr></thead>
        <tbody id="set-body"></tbody>
      </table>
      <div style="margin-top:8px;font-size:12px;color:var(--text2)">
        球员卡明细（产量/概率/权重）见「权重速查」页签
      </div>
    </div>

    <div id="n-info" class="n-info"></div>
    <div class="note">调整票数占比 → 各奖池产量等比缩放，权重即时更新。调整奖金不影响产量，仅影响预算使用率验算。权重误差 &lt; 5%。</div>
  </div>

  <div id="tab-weights" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-size:13px;color:var(--text2)">蓝色权重数字 → 直接填入后台系统</span>
      <button class="copy-btn" id="copyBtn" onclick="copyWeights()">复制全部权重</button>
    </div>
    <table>
      <thead><tr><th class="center">#</th><th>奖池</th><th>类别</th><th>项目</th><th>目标概率</th><th class="center">权重</th><th>验算概率</th><th class="center">误差</th></tr></thead>
      <tbody id="weight-body"></tbody>
    </table>
    <div class="note" style="margin-top:12px">「复制全部权重」会复制「项目名称 + 权重」到剪贴板，可直接贴到 Excel 或后台。</div>
  </div>
</div>

<script>
const SR_INIT = [
  {name:"拉明·亚马尔",prize:3888},
  {name:"哈里·凯恩",prize:2888},
  {name:"基利安·姆巴佩",prize:5168},
  {name:"利昂内尔·梅西",prize:6666},
  {name:"维尼修斯",prize:1688},
  {name:"埃尔林·哈兰德",prize:1688}
];

const SETS_INIT = [
  {name:"A套组",country:"西班牙",players:["佩德里","尼科·威廉姆斯","罗德里"],prize:2200},
  {name:"B套组",country:"英格兰",players:["布卡约·萨卡","朱德·贝林厄姆","科尔·帕尔默"],prize:1900},
  {name:"C套组",country:"法国",players:["乌斯曼·登贝莱","沃伦·扎伊尔-埃梅里","威廉·萨利巴"],prize:1500},
  {name:"D套组",country:"阿根廷",players:["劳塔罗·马丁内斯","亚历克西斯·麦卡利斯特","罗德里戈·德保罗"],prize:2500}
];

// N卡：6国家 + 12球员（独立N卡，不属于任何套组）
const N_NAMES = [
  "巴西","葡萄牙","德国","荷兰","挪威","意大利",
  "达尼·卡瓦哈尔","法比安·鲁伊斯","达尼·奥尔莫",
  "摩根·罗杰斯","安东尼·戈登","马库斯·拉什福德",
  "奥雷利安·楚阿梅尼","特奥·埃尔南德斯","兰德尔·科洛·穆阿尼",
  "埃米利亚诺·马丁内斯","克里斯蒂安·罗梅罗","尼古拉斯·奥塔门迪"
];

let sr = SR_INIT.map(s=>({...s,qty:0}));
let sets = SETS_INIT.map(s=>({...s,cqty:0,pqty:0}));
let weights = {intB:[],intM:[],intS:[],verB:[],verM:[],verS:[]};

function gv(id){ return parseFloat(document.getElementById(id).value)||0 }
function fmt(n){ return Math.round(n).toLocaleString() }

function solveWeights(bigP, midP, smallP){
  const nB=bigP.length, nM=midP.length, nS=smallP.length;
  const total=nB+nM+nS;
  const slotB=nB/total, slotM=nM/total, slotS=nS/total;

  let wB=bigP.map(p=>Math.max(p,1e-12)*1000);
  let wM=midP.map(p=>Math.max(p,1e-12)*1000);
  let wS=smallP.map(p=>Math.max(p,1e-12)*1000);

  for(let it=0;it<200;it++){
    const Wb=wB.reduce((a,b)=>a+b,0), Wm=wM.reduce((a,b)=>a+b,0), Ws=wS.reduce((a,b)=>a+b,0);
    const ab=Wb/nB, am=Wm/nM, as_=Ws/nS;
    const aB=wB.map(w=>(slotB/nB)*w/(w+(nM>0?slotM/slotB*am:0)+(nS>0?slotS/slotB*as_:0)));
    const aM=wM.map(w=>(slotM/nM)*w/((nB>0?slotB/slotM*ab:0)+w+(Wm-w)/(nM-1||1)*(1/nM)+(nS>0?slotS/slotM*as_:0)));
    const aS=wS.map(w=>(slotS/nS)*w/((nB>0?slotB/slotS*ab:0)+(nM>0?slotM/slotS*am:0)+w+(Ws-w)/(nS-1||1)*(1/nS)));
    wB=wB.map((w,i)=>aB[i]>0?w*Math.pow(bigP[i]/aB[i],0.5):w);
    wM=wM.map((w,i)=>aM[i]>0?w*Math.pow(midP[i]/aM[i],0.5):w);
    wS=wS.map((w,i)=>aS[i]>0?w*Math.pow(smallP[i]/aS[i],0.5):w);
  }

  const allW=[...wB,...wM,...wS];
  const mn=Math.min(...allW.filter(w=>w>0));
  const sc=10/(mn||1);
  const iB=wB.map(w=>Math.max(Math.round(w*sc),1));
  const iM=wM.map(w=>Math.max(Math.round(w*sc),1));
  const iS=wS.map(w=>Math.max(Math.round(w*sc),1));

  // Verify
  const Wb2=iB.reduce((a,b)=>a+b,0), Wm2=iM.reduce((a,b)=>a+b,0), Ws2=iS.reduce((a,b)=>a+b,0);
  const ab2=Wb2/nB, am2=Wm2/nM, as2=Ws2/(nS||1);
  const vB=iB.map(w=>(slotB/nB)*w/(w+(nM>0?slotM/slotB*am2:0)+(nS>0?slotS/slotB*as2:0)));
  const vM=iM.map(w=>(slotM/nM)*w/((nB>0?slotB/slotM*ab2:0)+w+(Wm2-w)/(nM-1||1)*(1/nM)+(nS>0?slotS/slotM*as2:0)));
  const vS=iS.map(w=>(slotS/nS)*w/((nB>0?slotB/slotS*ab2:0)+(nM>0?slotM/slotS*am2:0)+w+(Ws2-w)/(nS-1||1)*(1/nS)));

  return {intB:iB,intM:iM,intS:iS,verB:vB,verM:vM,verS:vS};
}

function calc(){
  const totalBet=gv('totalBet'), rtp=gv('rtp')/100, tickets=Math.max(gv('tickets'),1);
  const srPct=gv('srPct')/100, rPct=gv('rPct')/100;
  const rr=Math.max(gv('redeemRate'),1)/100, pMult=Math.max(gv('playerMultiplier'),0.1);
  const budget=totalBet*rtp;

  // focus 保留
  const focusedId = document.activeElement && document.activeElement.id || null;
  const focusedStart = document.activeElement && document.activeElement.selectionStart;
  const focusedEnd   = document.activeElement && document.activeElement.selectionEnd;

  // 讀取獎金輸入
  sr.forEach((c,i)=>{ const el=document.getElementById('sr-prize-'+i); if(el) c.prize=parseInt(el.value)||1; });
  sets.forEach((c,i)=>{ const el=document.getElementById('set-prize-'+i); if(el) c.prize=parseInt(el.value)||1; });

  // === 方案A：以 tickets 為主軸 ===
  // SR：srPct% 的票數，平均分配給每張 SR 卡
  const numSR = sr.length;
  sr.forEach(c=>{ c.qty = Math.max(Math.round(tickets * srPct / numSR), 1); });

  // R：rPct% 的票數，每套組平分；套組內按 1:pMult 拆分國家卡與球員卡
  const numSets = sets.length;
  sets.forEach(c=>{
    const setTickets = tickets * rPct / numSets;
    const totalParts = 1 + c.players.length * pMult;
    c.cqty = Math.max(Math.round(setTickets / totalParts), 1);
    c.pqty = Math.max(Math.round(c.cqty * pMult), 1);
  });

  // N：剩餘票數均分
  const srQty = sr.reduce((s,c)=>s+c.qty, 0);
  const rCountryQty = sets.reduce((s,c)=>s+c.cqty, 0);
  const rPlayerQty = sets.reduce((s,c)=>s+c.pqty*c.players.length, 0);
  const nTotal = tickets - srQty - rCountryQty - rPlayerQty;
  const numN = N_NAMES.length;
  const nEach = nTotal > 0 ? Math.round(nTotal / numN) : 0;

  // === 預算驗算（參考） ===
  const srSpend = sr.reduce((s,c)=>s+c.prize*c.qty, 0);
  const setSpend = sets.reduce((s,c)=>s+c.prize*Math.round(c.cqty*rr), 0);
  const totalSpend = srSpend + setSpend;
  const remain = budget - totalSpend;
  const usage = budget>0 ? totalSpend/budget*100 : 0;
  const over = remain < 0;

  // === 權重 ===
  const numRCards = sets.reduce((s,c)=>s+1+c.players.length, 0);
  const bigP = sr.map(c=>c.qty/tickets);
  const midP = sets.flatMap(c=>[c.cqty/tickets, ...c.players.map(()=>c.pqty/tickets)]);
  const smallP = Array(numN).fill(nEach/tickets);
  weights = solveWeights(bigP, midP, smallP);

  // === 更新張數顯示 ===
  document.getElementById('srCount').textContent = numSR;
  document.getElementById('rCount').textContent = numRCards;
  document.getElementById('totalCardTypes').textContent = numSR + numRCards + numN;

  // === 指標卡 ===
  document.getElementById('metrics').innerHTML =
    metricCard('总预算','¥'+fmt(budget),'') +
    metricCard('总支出','¥'+fmt(totalSpend), over?'danger':'') +
    metricCard('使用率',usage.toFixed(1)+'%', usage>100?'danger':usage>95?'ok':'') +
    metricCard('剩余','¥'+fmt(remain), over?'danger':'ok');

  // srPct+rPct>100% 警告
  const pctOver = srPct + rPct > 1;
  ['srPct','rPct'].forEach(id=>{ document.getElementById(id).style.borderColor = pctOver?'var(--red)':''; });

  // === SR Table ===
  let srHtml='';
  sr.forEach((c,i)=>{
    const prob=(c.qty/tickets*100).toFixed(3);
    const spend=c.prize*c.qty;
    srHtml+=`<tr class="sr-row"><td>${c.name}</td><td><input type="number" id="sr-prize-${i}" value="${c.prize}" onchange="calc()"></td><td class="num-cell">${fmt(c.qty)}</td><td class="prob-cell">${prob}%</td><td class="num-cell">${fmt(spend)}</td><td class="weight-cell">${weights.intB[i]}</td></tr>`;
  });
  srHtml+=`<tr class="total-row"><td>合计</td><td></td><td class="num-cell">${fmt(srQty)}</td><td class="prob-cell">${(srQty/tickets*100).toFixed(3)}%</td><td class="num-cell">${fmt(srSpend)}</td><td></td></tr>`;
  document.getElementById('sr-body').innerHTML=srHtml;

  // === R Table ===
  // Bug#2 fix: 國家卡在新 midP 中的 index = 各 set 的 (1+players.length) 累加
  let setHtml='';
  let countryMidIdx=0;
  sets.forEach((c,i)=>{
    const redeem=Math.round(c.cqty*rr);
    const spend=c.prize*redeem;
    setHtml+=`<tr class="r-row"><td>${c.name}</td><td>${c.country}</td><td><input type="number" id="set-prize-${i}" value="${c.prize}" onchange="calc()"></td><td class="num-cell">${fmt(c.cqty)}</td><td class="num-cell">${fmt(c.pqty)}</td><td class="num-cell">${fmt(redeem)}</td><td class="num-cell">${fmt(spend)}</td><td class="weight-cell">${weights.intM[countryMidIdx]}</td></tr>`;
    countryMidIdx += 1 + c.players.length;
  });
  setHtml+=`<tr class="total-row"><td>合计</td><td></td><td></td><td class="num-cell">${fmt(rCountryQty)}</td><td class="num-cell">${fmt(rPlayerQty)}</td><td class="num-cell">${sets.reduce((s,c)=>s+Math.round(c.cqty*rr),0)}</td><td class="num-cell">${fmt(setSpend)}</td><td></td></tr>`;
  document.getElementById('set-body').innerHTML=setHtml;

  // Bug#1 fix: innerHTML 重建後恢復 focus
  if(focusedId){
    const el=document.getElementById(focusedId);
    if(el){ el.focus(); try{ el.setSelectionRange(focusedStart,focusedEnd); }catch(e){} }
  }

  // === N Info ===
  document.getElementById('n-info').innerHTML =
    `<strong>N 卡 (${numN}张)</strong>` +
    `<span>每张产量 = <strong>${fmt(nEach)}</strong></span>` +
    `<span>概率 = <strong>${(nEach/Math.max(tickets,1)*100).toFixed(3)}%</strong></span>` +
    `<span>权重 = <strong style="color:var(--blue-dark);font-size:16px">${weights.intS[0]||0}</strong></span>` +
    (nTotal<0?'<span class="error">产量为负！SR/R 产量超过总券数</span>':'');

  renderWeightsTab(tickets, nEach);
}

function renderWeightsTab(tickets, nEach){
  let html='';
  let idx=1;
  const allCards=[];

  sr.forEach((c,i)=>{
    const p=(c.qty/tickets*100).toFixed(3);
    const v=(weights.verB[i]*100).toFixed(3);
    const e=errPct(p,v);
    allCards.push({name:c.name,w:weights.intB[i]});
    html+=`<tr class="sr-row"><td class="center">${idx++}</td><td>大奖池</td><td>SR</td><td>${c.name}</td><td class="prob-cell">${p}%</td><td class="weight-cell">${weights.intB[i]}</td><td class="prob-cell">${v}%</td><td class="center ${errClass(e)}">${e}</td></tr>`;
  });

  let mIdx=0;
  sets.forEach((c,i)=>{
    const p=(c.cqty/tickets*100).toFixed(3);
    const v=(weights.verM[mIdx]*100).toFixed(3);
    const e=errPct(p,v);
    allCards.push({name:c.country,w:weights.intM[mIdx]});
    html+=`<tr class="r-row"><td class="center">${idx++}</td><td>中奖池</td><td>R(国家)</td><td>${c.country}</td><td class="prob-cell">${p}%</td><td class="weight-cell">${weights.intM[mIdx]}</td><td class="prob-cell">${v}%</td><td class="center ${errClass(e)}">${e}</td></tr>`;
    mIdx++;

    c.players.forEach(pl=>{
      const pp=(c.pqty/tickets*100).toFixed(3);
      const vv=(weights.verM[mIdx]*100).toFixed(3);
      const ee=errPct(pp,vv);
      allCards.push({name:pl,w:weights.intM[mIdx]});
      html+=`<tr class="r-row"><td class="center">${idx++}</td><td>中奖池</td><td>R(球员)</td><td>${pl}</td><td class="prob-cell">${pp}%</td><td class="weight-cell">${weights.intM[mIdx]}</td><td class="prob-cell">${vv}%</td><td class="center ${errClass(ee)}">${ee}</td></tr>`;
      mIdx++;
    });
  });

  N_NAMES.forEach((n,i)=>{
    const prob=(nEach/tickets*100).toFixed(3);
    const v=(weights.verS[i]*100).toFixed(3);
    const e=errPct(prob,v);
    allCards.push({name:n,w:weights.intS[i]});
    html+=`<tr class="n-row"><td class="center">${idx++}</td><td>小奖池</td><td>${i<6?'N(国家)':'N(球员)'}</td><td>${n}</td><td class="prob-cell">${prob}%</td><td class="weight-cell">${weights.intS[i]}</td><td class="prob-cell">${v}%</td><td class="center ${errClass(e)}">${e}</td></tr>`;
  });

  document.getElementById('weight-body').innerHTML=html;
  window._allCards=allCards;
}

function errPct(target,actual){
  const t=parseFloat(target),a=parseFloat(actual);
  if(t===0) return '+0.0%';
  const e=((a-t)/t*100);
  return (e>=0?'+':'')+e.toFixed(1)+'%';
}
function errClass(e){
  const v=Math.abs(parseFloat(e));
  return v<3?'err-ok':v<8?'err-warn':'err-bad';
}

function metricCard(label,value,cls){
  return `<div class="metric ${cls}"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-params').style.display=tab==='params'?'':'none';
  document.getElementById('tab-weights').style.display=tab==='weights'?'':'none';
}

function copyWeights(){
  if(!window._allCards) return;
  const text=window._allCards.map(c=>c.name+'\t'+c.w).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='已复制！';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制全部权重';btn.classList.remove('copied')},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
  });
}

calc();
</script>
